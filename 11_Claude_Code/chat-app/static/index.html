<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Codebase Concierge</title>
<style>
  :root { --bg:#0f1115; --panel:#171a21; --line:#262b36; --text:#e6e8ee; --muted:#8b93a7; --accent:#c96442; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text);
         font:15px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         display:flex; flex-direction:column; height:100vh; }
  header { padding:14px 20px; border-bottom:1px solid var(--line); }
  header h1 { margin:0; font-size:15px; font-weight:600; }
  header p { margin:2px 0 0; font-size:12px; color:var(--muted); }
  #log { flex:1; overflow-y:auto; padding:24px 20px; display:flex; flex-direction:column; gap:14px; }
  .msg { max-width:min(720px, 90%); padding:10px 14px; border-radius:12px; white-space:pre-wrap; }
  .user { align-self:flex-end; background:var(--accent); }
  .bot { align-self:flex-start; background:var(--panel); border:1px solid var(--line); }
  .bot.pending { color:var(--muted); font-style:italic; }
  form { display:flex; gap:10px; padding:16px 20px; border-top:1px solid var(--line); }
  input { flex:1; background:var(--panel); border:1px solid var(--line); border-radius:10px;
          padding:11px 14px; color:var(--text); font-size:15px; }
  input:focus { outline:none; border-color:var(--accent); }
  button { background:var(--accent); border:0; border-radius:10px; padding:0 20px;
           color:#fff; font-weight:600; cursor:pointer; }
  button:disabled { opacity:.5; cursor:default; }
</style>
</head>
<body>
<header>
  <h1>Codebase Concierge</h1>
  <p id="target">ask me about the repo</p>
</header>

<div id="log"></div>

<form id="form">
  <input id="input" placeholder="What does this repo do?" autocomplete="off" autofocus>
  <button id="send">Send</button>
</form>

<script>
const conversationId = crypto.randomUUID();
const log = document.getElementById('log');
const form = document.getElementById('form');
const input = document.getElementById('input');
const send = document.getElementById('send');

fetch('/api/health').then(r => r.json())
  .then(d => document.getElementById('target').textContent = d.target_repo);

function add(text, cls) {
  const el = document.createElement('div');
  el.className = 'msg ' + cls;
  el.textContent = text;
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
  return el;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const message = input.value.trim();
  if (!message) return;

  add(message, 'user');
  input.value = '';
  send.disabled = true;
  const pending = add('reading the repo…', 'bot pending');

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, conversation_id: conversationId }),
    });
    const data = await res.json();
    pending.textContent = data.reply;
  } catch (err) {
    pending.textContent = 'Could not reach the server.';
  }
  pending.classList.remove('pending');
  send.disabled = false;
  input.focus();
});
</script>
</body>
</html>
